<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications - Inclusify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="accessibility-toggle" role="toolbar" aria-label="Accessibility controls">
    <button onclick="Accessibility.toggleHighContrast()" class="bg-gray-800 text-yellow-400 hover:bg-gray-700" title="Toggle High Contrast (Alt+C)" aria-label="Toggle high contrast"><i class="fas fa-adjust"></i></button>
    <button onclick="Accessibility.increaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Increase Font Size" aria-label="Increase font size"><i class="fas fa-plus"></i></button>
    <button onclick="Accessibility.decreaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Decrease Font Size" aria-label="Decrease font size"><i class="fas fa-minus"></i></button>
    <button onclick="Accessibility.readPageContent()" class="bg-gray-800 text-blue-400 hover:bg-gray-700" title="Read Page" aria-label="Read page aloud"><i class="fas fa-volume-up"></i></button>
    <button onclick="VoiceCommands.toggle()" class="bg-gray-800 text-green-400 hover:bg-gray-700" title="Voice Control" aria-label="Toggle voice control"><i class="fas fa-microphone"></i></button>
  </div>
  <nav class="bg-white shadow-sm border-b sticky top-0 z-40" role="navigation"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><a href="/" class="flex items-center gap-2 text-blue-600 font-bold text-xl"><i class="fas fa-hands-holding-circle text-2xl"></i><span>Inclusify</span></a><div id="nav-links" class="flex items-center gap-4"></div></div></div></nav>

  <main id="main-content">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">My Applications</h1>
      <p class="text-gray-600 mb-8">Track the status of all your submitted applications.</p>

      <div class="flex gap-3 mb-6 flex-wrap">
        <button onclick="filterApps('')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white">All</button>
        <button onclick="filterApps('applied')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">Applied</button>
        <button onclick="filterApps('under_review')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">Under Review</button>
        <button onclick="filterApps('accepted')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">Accepted</button>
        <button onclick="filterApps('rejected')" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200">Rejected</button>
      </div>

      <div id="applications-list" class="space-y-4">
        <p class="text-center text-gray-500 py-8">Loading applications...</p>
      </div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto"><div class="max-w-7xl mx-auto px-4 text-center text-sm"><p>&copy; 2026 Inclusify.</p></div></footer>

  <script src="/js/app.js"></script>
  <script src="/js/accessibility.js"></script>
  <script src="/js/voice-commands.js"></script>
  <script src="/js/chatbot.js"></script>
  <script>
    let allApps = [];
    let currentFilter = '';

    async function loadApplications() {
      if (!Auth.user || Auth.user.role !== 'user') { window.location.href = '/'; return; }

      try {
        const data = await API.get('/api/applications/my-applications');
        allApps = data.applications || [];
        renderApps();
      } catch (err) {
        document.getElementById('applications-list').innerHTML = '<p class="text-center text-red-500">Error loading applications.</p>';
      }
    }

    function filterApps(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.className = btn.className.replace('bg-blue-600 text-white', 'bg-gray-100 text-gray-700');
      });
      event.target.className = event.target.className.replace('bg-gray-100 text-gray-700', 'bg-blue-600 text-white');
      renderApps();
    }

    function renderApps() {
      const filtered = currentFilter ? allApps.filter(a => a.status === currentFilter) : allApps;
      const container = document.getElementById('applications-list');

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 bg-white rounded-2xl border">
            <i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">${currentFilter ? 'No applications with this status.' : 'You haven\'t applied to any opportunities yet.'}</p>
            <a href="/opportunities.html" class="inline-block mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">Browse Opportunities</a>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(app => {
        const opp = app.opportunity_id || {};
        return `
          <div class="bg-white rounded-xl border p-5 hover:shadow-md transition animate-fade-in">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <span class="${getBadgeClass(opp.type || 'job')} text-xs">${opp.type || 'N/A'}</span>
                  <span class="${getBadgeClass(app.status)} text-xs">${app.status.replace('_', ' ')}</span>
                </div>
                <h3 class="text-lg font-bold text-gray-900">${opp.title || 'Opportunity'}</h3>
                <p class="text-sm text-gray-500">by ${opp.organizer_id?.org_name || opp.organizer_id?.name || 'Organization'}</p>
              </div>
              <div class="text-right text-sm text-gray-500">
                <p>Applied: ${formatDate(app.createdAt)}</p>
                ${app.reviewed_at ? `<p>Reviewed: ${formatDate(app.reviewed_at)}</p>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function initPage() { loadApplications(); }
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
