<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Opportunities - Ability</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="accessibility-toggle" role="toolbar" aria-label="Accessibility controls">
    <button onclick="Accessibility.toggleHighContrast()" class="bg-gray-800 text-yellow-400 hover:bg-gray-700" title="Toggle High Contrast (Alt+C)" aria-label="Toggle high contrast"><i class="fas fa-adjust"></i></button>
    <button onclick="Accessibility.increaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Increase Font Size" aria-label="Increase font size"><i class="fas fa-plus"></i></button>
    <button onclick="Accessibility.decreaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Decrease Font Size" aria-label="Decrease font size"><i class="fas fa-minus"></i></button>
    <button onclick="Accessibility.readPageContent()" class="bg-gray-800 text-blue-400 hover:bg-gray-700" title="Read Page" aria-label="Read page aloud"><i class="fas fa-volume-up"></i></button>
    <button onclick="VoiceCommands.toggle()" class="bg-gray-800 text-green-400 hover:bg-gray-700" title="Voice Control" aria-label="Toggle voice control"><i class="fas fa-microphone"></i></button>
  </div>

  <nav class="bg-white shadow-sm border-b sticky top-0 z-40" role="navigation" aria-label="Main navigation">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="/" class="flex items-center gap-2 text-blue-600 font-bold text-xl" aria-label="Ability Home"><i class="fas fa-hands-holding-circle text-2xl"></i><span>Ability</span></a>
        <div id="nav-links" class="flex items-center gap-4"></div>
      </div>
    </div>
  </nav>

  <main id="main-content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col lg:flex-row gap-8">
        <aside class="lg:w-72 flex-shrink-0">
          <div class="bg-white rounded-2xl shadow-sm border p-6 sticky top-24">
            <h2 class="text-lg font-bold text-gray-900 mb-4"><i class="fas fa-filter mr-2 text-blue-600"></i>Filters</h2>
            <form id="filter-form" onsubmit="applyFilters(event)">
              <div class="mb-4">
                <label for="search-keyword" class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                <input type="text" id="search-keyword" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="Keywords...">
              </div>
              <div class="mb-4">
                <label for="filter-type" class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                <select id="filter-type" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500">
                  <option value="">All Types</option>
                  <option value="job">Jobs</option>
                  <option value="scholarship">Scholarships</option>
                  <option value="training">Training</option>
                  <option value="event">Events</option>
                  <option value="resource">Resources</option>
                </select>
              </div>
              <div class="mb-6">
                <label for="filter-location" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                <input type="text" id="filter-location" class="w-full px-3 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500" placeholder="e.g. Remote, New York">
              </div>
              <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
                <i class="fas fa-search mr-1"></i>Apply Filters
              </button>
              <button type="button" onclick="resetFilters()" class="w-full py-2 mt-2 border text-gray-600 rounded-lg font-medium hover:bg-gray-50 transition">
                Reset
              </button>
            </form>
          </div>
        </aside>

        <div class="flex-1">
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Opportunities</h1>
            <span id="result-count" class="text-sm text-gray-500"></span>
          </div>
          <div id="opportunity-grid" class="grid md:grid-cols-2 gap-6">
            <p class="col-span-full text-center text-gray-500 py-12">Loading...</p>
          </div>
          <div id="pagination-container"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center text-sm">
      <p>&copy; 2026 Ability. Built with accessibility at its core.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
  <script src="/js/accessibility.js"></script>
  <script src="/js/voice-commands.js"></script>
  <script src="/js/chatbot.js"></script>
  <script>
    let currentPage = 1;

    async function loadOpportunities(page = 1) {
      currentPage = page;
      const keyword = document.getElementById('search-keyword').value;
      const type = document.getElementById('filter-type').value;
      const location = document.getElementById('filter-location').value;

      let url = `/api/opportunities?page=${page}&limit=9`;
      if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
      if (type) url += `&type=${type}`;
      if (location) url += `&location=${encodeURIComponent(location)}`;

      try {
        const data = await API.get(url);
        const grid = document.getElementById('opportunity-grid');
        document.getElementById('result-count').textContent = `${data.pagination.total} opportunities found`;

        if (!data.opportunities || data.opportunities.length === 0) {
          grid.innerHTML = '<div class="col-span-full text-center py-12"><i class="fas fa-search text-4xl text-gray-300 mb-4"></i><p class="text-gray-500 text-lg">No opportunities found matching your criteria.</p></div>';
          document.getElementById('pagination-container').innerHTML = '';
          return;
        }

        grid.innerHTML = data.opportunities.map(opp => `
          <div class="bg-white rounded-2xl shadow-sm border p-6 hover:shadow-lg transition animate-fade-in">
            <div class="flex items-center justify-between mb-3">
              <span class="${getBadgeClass(opp.type)}">${opp.type}</span>
              <span class="text-xs text-gray-400">${formatDate(opp.createdAt)}</span>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2">${opp.title}</h3>
            <p class="text-gray-600 text-sm mb-3">${opp.description.substring(0, 150)}${opp.description.length > 150 ? '...' : ''}</p>
            <div class="flex flex-wrap gap-3 text-xs text-gray-500 mb-4">
              <span><i class="fas fa-map-marker-alt mr-1"></i>${opp.location || 'Remote'}</span>
              <span><i class="fas fa-building mr-1"></i>${opp.organizer_id?.org_name || opp.organizer_id?.name || 'Organization'}</span>
              <span><i class="fas fa-eye mr-1"></i>${opp.views}</span>
              ${opp.application_deadline ? `<span><i class="fas fa-clock mr-1"></i>Due: ${formatDate(opp.application_deadline)}</span>` : ''}
            </div>
            <button onclick="viewOpportunity('${opp._id}')" class="w-full py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition text-sm">
              View Details <i class="fas fa-arrow-right ml-1"></i>
            </button>
          </div>
        `).join('');

        document.getElementById('pagination-container').innerHTML = renderPagination(data.pagination, 'loadOpportunities');
      } catch (err) {
        document.getElementById('opportunity-grid').innerHTML = '<p class="col-span-full text-center text-red-500 py-12">Error loading opportunities.</p>';
      }
    }

    function applyFilters(e) {
      e.preventDefault();
      loadOpportunities(1);
    }

    function resetFilters() {
      document.getElementById('search-keyword').value = '';
      document.getElementById('filter-type').value = '';
      document.getElementById('filter-location').value = '';
      loadOpportunities(1);
    }

    function viewOpportunity(id) {
      window.location.href = `/opportunity-detail.html?id=${id}`;
    }

    async function initPage() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('type')) {
        document.getElementById('filter-type').value = params.get('type');
      }
      loadOpportunities(1);
    }

    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
