<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Opportunities - Inclusify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="accessibility-toggle" role="toolbar" aria-label="Accessibility controls">
    <button onclick="Accessibility.toggleHighContrast()" class="bg-gray-800 text-yellow-400 hover:bg-gray-700" title="Toggle High Contrast (Alt+C)" aria-label="Toggle high contrast"><i class="fas fa-adjust"></i></button>
    <button onclick="Accessibility.increaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Increase Font Size" aria-label="Increase font size"><i class="fas fa-plus"></i></button>
    <button onclick="Accessibility.decreaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Decrease Font Size" aria-label="Decrease font size"><i class="fas fa-minus"></i></button>
    <button onclick="Accessibility.readPageContent()" class="bg-gray-800 text-blue-400 hover:bg-gray-700" title="Read Page" aria-label="Read page aloud"><i class="fas fa-volume-up"></i></button>
    <button onclick="VoiceCommands.toggle()" class="bg-gray-800 text-green-400 hover:bg-gray-700" title="Voice Control" aria-label="Toggle voice control"><i class="fas fa-microphone"></i></button>
  </div>
  <nav class="bg-white shadow-sm border-b sticky top-0 z-40" role="navigation"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><a href="/" class="flex items-center gap-2 text-blue-600 font-bold text-xl"><i class="fas fa-hands-holding-circle text-2xl"></i><span>Inclusify</span></a><div id="nav-links" class="flex items-center gap-4"></div></div></div></nav>

  <main id="main-content">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex items-center justify-between mb-8">
        <div><h1 class="text-3xl font-bold text-gray-900">My Opportunities</h1><p class="text-gray-600 mt-1">Manage and toggle visibility of your posted opportunities.</p></div>
        <a href="/create-opportunity.html" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition"><i class="fas fa-plus mr-2"></i>New</a>
      </div>
      <div id="opportunities-list" class="space-y-4"><p class="text-center text-gray-500 py-8">Loading...</p></div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto"><div class="max-w-7xl mx-auto px-4 text-center text-sm"><p>&copy; 2026 Inclusify.</p></div></footer>

  <script src="/js/app.js"></script>
  <script src="/js/accessibility.js"></script>
  <script src="/js/voice-commands.js"></script>
  <script src="/js/chatbot.js"></script>
  <script>
    async function loadOpportunities() {
      if (!Auth.user || (Auth.user.role !== 'organizer' && Auth.user.role !== 'admin')) { window.location.href = '/'; return; }
      try {
        const data = await API.get('/api/opportunities/my-opportunities');
        const opps = data.opportunities || [];
        const container = document.getElementById('opportunities-list');

        if (opps.length === 0) {
          container.innerHTML = '<div class="text-center py-12 bg-white rounded-2xl border"><i class="fas fa-folder-open text-4xl text-gray-300 mb-4"></i><p class="text-gray-500 text-lg">No opportunities posted yet.</p><a href="/create-opportunity.html" class="inline-block mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold">Create First Opportunity</a></div>';
          return;
        }

        container.innerHTML = opps.map(opp => `
          <div class="bg-white rounded-xl border p-5 hover:shadow-md transition animate-fade-in">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <span class="${getBadgeClass(opp.type)} text-xs">${opp.type}</span>
                  <span class="text-xs px-2 py-0.5 rounded-full ${opp.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${opp.is_active ? 'Active' : 'Inactive'}</span>
                </div>
                <h3 class="text-lg font-bold text-gray-900">${opp.title}</h3>
                <div class="flex gap-4 text-xs text-gray-500 mt-1">
                  <span><i class="fas fa-eye mr-1"></i>${opp.views} views</span>
                  <span><i class="fas fa-calendar mr-1"></i>${formatDate(opp.createdAt)}</span>
                  ${opp.application_deadline ? `<span><i class="fas fa-clock mr-1"></i>Due: ${formatDate(opp.application_deadline)}</span>` : ''}
                </div>
              </div>
              <div class="flex gap-2">
                <button onclick="toggleOpportunity('${opp._id}')" class="px-4 py-2 text-sm border rounded-lg font-medium ${opp.is_active ? 'border-yellow-300 text-yellow-700 hover:bg-yellow-50' : 'border-green-300 text-green-700 hover:bg-green-50'}">
                  <i class="fas fa-${opp.is_active ? 'eye-slash' : 'eye'} mr-1"></i>${opp.is_active ? 'Deactivate' : 'Activate'}
                </button>
                <button onclick="window.location.href='/create-opportunity.html?edit=${opp._id}'" class="px-4 py-2 text-sm border border-blue-300 text-blue-700 rounded-lg font-medium hover:bg-blue-50">
                  <i class="fas fa-edit mr-1"></i>Edit
                </button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('opportunities-list').innerHTML = '<p class="text-center text-red-500 py-8">Error loading opportunities.</p>';
      }
    }

    async function toggleOpportunity(id) {
      try {
        await API.delete(`/api/opportunities/${id}`);
        showToast('Opportunity updated!', 'success');
        loadOpportunities();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function initPage() { loadOpportunities(); }
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
