<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Inclusify</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="accessibility-toggle" role="toolbar" aria-label="Accessibility controls">
    <button onclick="Accessibility.toggleHighContrast()" class="bg-gray-800 text-yellow-400 hover:bg-gray-700" title="Toggle High Contrast (Alt+C)" aria-label="Toggle high contrast"><i class="fas fa-adjust"></i></button>
    <button onclick="Accessibility.increaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Increase Font Size" aria-label="Increase font size"><i class="fas fa-plus"></i></button>
    <button onclick="Accessibility.decreaseFontSize()" class="bg-gray-800 text-white hover:bg-gray-700" title="Decrease Font Size" aria-label="Decrease font size"><i class="fas fa-minus"></i></button>
    <button onclick="Accessibility.readPageContent()" class="bg-gray-800 text-blue-400 hover:bg-gray-700" title="Read Page" aria-label="Read page aloud"><i class="fas fa-volume-up"></i></button>
    <button onclick="VoiceCommands.toggle()" class="bg-gray-800 text-green-400 hover:bg-gray-700" title="Voice Control" aria-label="Toggle voice control"><i class="fas fa-microphone"></i></button>
  </div>
  <nav class="bg-white shadow-sm border-b sticky top-0 z-40" role="navigation"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8"><div class="flex justify-between items-center h-16"><a href="/" class="flex items-center gap-2 text-blue-600 font-bold text-xl"><i class="fas fa-hands-holding-circle text-2xl"></i><span>Inclusify</span></a><div id="nav-links" class="flex items-center gap-4"></div></div></div></nav>

  <main id="main-content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Admin Dashboard</h1>
        <p class="text-gray-600 mt-1">System overview and management controls.</p>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl p-5 border shadow-sm">
          <div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center"><i class="fas fa-users text-blue-600"></i></div><div><p class="text-sm text-gray-500">Total Users</p><p class="text-2xl font-bold" id="stat-users">0</p></div></div>
        </div>
        <div class="bg-white rounded-xl p-5 border shadow-sm">
          <div class="flex items-center gap-3"><div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center"><i class="fas fa-briefcase text-green-600"></i></div><div><p class="text-sm text-gray-500">Opportunities</p><p class="text-2xl font-bold" id="stat-opps">0</p></div></div>
        </div>
        <div class="bg-white rounded-xl p-5 border shadow-sm">
          <div class="flex items-center gap-3"><div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center"><i class="fas fa-file-alt text-purple-600"></i></div><div><p class="text-sm text-gray-500">Applications</p><p class="text-2xl font-bold" id="stat-apps">0</p></div></div>
        </div>
        <div class="bg-white rounded-xl p-5 border shadow-sm">
          <div class="flex items-center gap-3"><div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center"><i class="fas fa-clock text-orange-600"></i></div><div><p class="text-sm text-gray-500">24h Activity</p><p class="text-2xl font-bold" id="stat-activity">0</p></div></div>
        </div>
      </div>

      <div class="grid lg:grid-cols-3 gap-8 mb-8">
        <div class="bg-white rounded-2xl shadow-sm border p-6">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Users by Role</h2>
          <canvas id="roleChart" height="220"></canvas>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border p-6">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Opportunity Types</h2>
          <canvas id="typeChart" height="220"></canvas>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border p-6">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Recent Activity (24h)</h2>
          <canvas id="activityChart" height="220"></canvas>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl shadow-sm border p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold text-gray-900">User Management</h2>
            <div class="flex gap-2">
              <select id="user-role-filter" onchange="loadUsers()" class="px-3 py-1.5 border rounded-lg text-sm">
                <option value="">All Roles</option>
                <option value="user">Users</option>
                <option value="organizer">Organizers</option>
                <option value="admin">Admins</option>
              </select>
            </div>
          </div>
          <div id="users-list" class="max-h-96 overflow-y-auto space-y-2">
            <p class="text-center text-gray-500 py-4">Loading...</p>
          </div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border p-6">
          <h2 class="text-lg font-bold text-gray-900 mb-4">Activity Log</h2>
          <div id="activity-log" class="max-h-96 overflow-y-auto space-y-3">
            <p class="text-center text-gray-500 py-4">Loading...</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-900 text-gray-400 py-8 mt-auto"><div class="max-w-7xl mx-auto px-4 text-center text-sm"><p>&copy; 2026 Inclusify.</p></div></footer>

  <script src="/js/app.js"></script>
  <script src="/js/accessibility.js"></script>
  <script src="/js/voice-commands.js"></script>
  <script src="/js/chatbot.js"></script>
  <script>
    async function loadDashboard() {
      if (!Auth.user || Auth.user.role !== 'admin') { window.location.href = '/'; return; }

      try {
        const data = await API.get('/api/admin/stats');
        const s = data.stats;

        document.getElementById('stat-users').textContent = s.totalUsers;
        document.getElementById('stat-opps').textContent = s.totalOpportunities;
        document.getElementById('stat-apps').textContent = s.totalApplications;
        document.getElementById('stat-activity').textContent = s.recentActivity;

        new Chart(document.getElementById('roleChart'), {
          type: 'doughnut',
          data: { labels: ['Users', 'Organizers', 'Admins'], datasets: [{ data: [s.roleCounts.user||0, s.roleCounts.organizer||0, s.roleCounts.admin||0], backgroundColor: ['#3b82f6','#22c55e','#8b5cf6'] }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        const types = s.typeCounts;
        new Chart(document.getElementById('typeChart'), {
          type: 'pie',
          data: { labels: Object.keys(types), datasets: [{ data: Object.values(types), backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#8b5cf6','#ec4899'] }] },
          options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        const logs = s.recentLogs || [];
        const logCounts = {};
        logs.forEach(l => {
          const h = new Date(l.createdAt).getHours();
          logCounts[h] = (logCounts[h]||0) + 1;
        });
        const hours = Array.from({length:24}, (_,i) => i);
        new Chart(document.getElementById('activityChart'), {
          type: 'bar',
          data: { labels: hours.map(h => `${h}:00`), datasets: [{ label: 'Actions', data: hours.map(h => logCounts[h]||0), backgroundColor: '#3b82f6' }] },
          options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });

        renderActivityLog(logs);
        loadUsers();
      } catch (err) { console.error(err); }
    }

    function renderActivityLog(logs) {
      const container = document.getElementById('activity-log');
      if (logs.length === 0) { container.innerHTML = '<p class="text-gray-500 text-center py-4">No recent activity.</p>'; return; }
      container.innerHTML = logs.map(l => `
        <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg text-sm">
          <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center flex-shrink-0">
            <i class="fas fa-${l.action.includes('login')?'sign-in':l.action.includes('signup')?'user-plus':l.action.includes('application')?'file-alt':'cog'} text-blue-600 text-xs"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-medium text-gray-900 truncate">${l.description}</p>
            <p class="text-xs text-gray-500">${l.user_id?.name || 'System'} &middot; ${formatDate(l.createdAt)}</p>
          </div>
        </div>
      `).join('');
    }

    async function loadUsers() {
      const role = document.getElementById('user-role-filter').value;
      try {
        const url = role ? `/api/admin/users?role=${role}` : '/api/admin/users';
        const data = await API.get(url);
        const users = data.users || [];
        const container = document.getElementById('users-list');

        if (users.length === 0) { container.innerHTML = '<p class="text-gray-500 text-center py-4">No users found.</p>'; return; }

        container.innerHTML = users.map(u => `
          <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm font-bold">${u.name.charAt(0).toUpperCase()}</div>
              <div><p class="font-medium text-sm text-gray-900">${u.name}</p><p class="text-xs text-gray-500">${u.email}</p></div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs bg-gray-200 px-2 py-0.5 rounded-full">${u.role}</span>
              ${u.role !== 'admin' ? `<button onclick="deleteUser('${u._id}')" class="text-red-500 hover:text-red-700 text-sm" title="Delete user" aria-label="Delete user ${u.name}"><i class="fas fa-trash"></i></button>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) { console.error(err); }
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      try {
        await API.delete(`/api/admin/users/${id}`);
        showToast('User deleted', 'success');
        loadUsers();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function initPage() { loadDashboard(); }
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
